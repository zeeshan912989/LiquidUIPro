    <linearGradient id="waterGoldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A8853F" stop-opacity="0.9"/>
